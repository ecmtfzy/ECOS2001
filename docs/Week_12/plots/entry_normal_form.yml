schema: EconSchema
version: 1
layout:
  GameMatrixLayout:
    gameMatrix:
      players:
        - Entrant
        - Incumbent
      strategies:
        - [Out, In]
        - [Accommodate, Fight]
      payoffs:
        - [[0,"'\\\\underline{2}'"],["'\\\\underline{0}'","'\\\\underline{2}'"]]
        - [["'\\\\underline{2}'","'\\\\underline{1}'"],[-1,-1]]
