---
schema: EconSchema
version: 1
aspectRatio: 1.6
params:
- name: p1
  value: 10
  min: 5
  max: 30
- name: p2
  value: 5
  min: 5
  max: 30
- name: end1
  value: 8
  min: 0
  max: 15
- name: end2
  value: 8
  min: 0
  max: 24
- name: sell1
  value: 0.5
  min: 0
  max: 1
  round: 0.01
- name: showBL
  value: 0
calcs:
  m: (params.p1*params.end1 + params.p2*params.end2)
  dx: (params.end1*params.sell1)
  dm: (params.p1*calcs.dx)
  dy: (calcs.dm/params.p2)
  x1: (params.end1 - calcs.dx)
  x2: (params.end2 + calcs.dy)
layout:
  OneGraphPlusSidebar:
    graph:
      xAxis:
        title: Units of Good 1
        max: 25
      yAxis:
        title: Units of Good 2
        max: 25
      objects:
      - EconBudgetLine:
          p1: params.p1
          p2: params.p2
          m: calcs.m
          draggable: false
          handles: false
          set: false
          #xInterceptLabel: "e_1 + {p_2 \\over p_1}e_2"
          #yInterceptLabel: "e_2 + {p_1 \\over p_2}e_1"
          show: params.showBL
      - Point:
          coordinates: [params.end1, params.end2]
          color: endowment
          droplines:
            vertical: e_1
            horizontal: e_2
          label:
            text: "`E = (${params.end1}, ${params.end2})`"
          drag:
            - horizontal: end1
            - vertical: end2
      - Point:
          coordinates: [calcs.x1, calcs.x2]
          droplines:
            vertical: x_1
            horizontal: x_2
          label:
            text: "`X = (${calcs.x1.toFixed(2)}, ${calcs.x2.toFixed(2)})`"
          drag:
            - directions: x
              param: sell1
              expression: (1 - drag.x/params.end1)
      - Segment:
          a: [params.end1, (0.5*params.end2)]
          b: [calcs.x1, (0.5*params.end2)]
          color: supply
          endArrow: true
          trim: 0.1
          label:
            text: "`\\\\text{sell ${calcs.dx.toFixed(2)}}`"
            fontSize: 8
      - Segment:
          a: [(0.5*calcs.x1), params.end2]
          b: [(0.5*calcs.x1), calcs.x2]
          color: demand
          endArrow: true
          trim: 0.1
          label:
            text: "`\\\\text{buy ${calcs.dy.toFixed(2)}}`"
            fontSize: 8
    sidebar:
      controls:
      - title: Buying and Selling from an Endowment
        description: Point E shows Bob's endowment. Point X shows a point he can trade to by selling some of his good 1 and using the money to buy good 2. Try dragging either point, or changing the prices.
        sliders:
        - param: p1
          label: p_1
        - param: p2
          label: p_2
        checkboxes:
          - param: showBL
            label: \text{Show budget line}
    explanation:
      divs:
      - html: "`If Bob sells ${calcs.dx.toFixed(2)} units of good 1 at price $p_1 = ${params.p1}$ each, he earns $\\\\$ ${calcs.dm.toFixed(2)}$.`"
      - html: "`With that $\\\\$ ${calcs.dm.toFixed(2)}$, he can buy ${calcs.dy.toFixed(2)} units of good 2 at price $p_2 = ${params.p2}$ each.`"