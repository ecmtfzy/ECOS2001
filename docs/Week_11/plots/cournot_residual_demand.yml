schema: EconSchema
version: 1
params:
- name: q1
  value: 33
  min: 0
  max: 99
  round: 1
- name: q2
  value: 33
  min: 0
  max: 99
  round: 1
- name: showMR1
  value: false
- name: showMR2
  value: false
- name: showqs
  value: true
calcs:
  Q: (params.q1 + params.q2)
  P: (max(100 - calcs.Q,0))
  profit1: ((calcs.P - 1)*params.q1)
  profit2: ((calcs.P - 1)*params.q2)
  resInt1: (max(100 - params.q2, 0))
  resInt2: (max(100 - params.q1, 0))
layout:
  ThreeHorizontalGraphs:
    leftGraph:
      xAxis:
        max: 100
        ticks: 0
      yAxis:
        max: 110
        ticks: 0
      objects:
      - EconLinearMonopoly:
          demand:
            xIntercept: calcs.resInt1
            invSlope: -1
            label:
              x: 2
              position: bl
              text: P(q_1 | q_2)
            marginalRevenue:
              show: params.showMR1
              label:
                y: 2
                text: MR_1
          cost:
            yIntercept: 1
            label:
              x: 95
              text: MC_1
      - Rectangle:
          a: [0, 1]
          b: [params.q1, calcs.P]
          fill: green
          show: (calcs.profit1 > 0)
          label:
            text: calcs.profit1.toFixed(0)
      - Rectangle:
          a: [0, 1]
          b: [params.q1, calcs.P]
          fill: red
          show: (calcs.profit1 < 0)
          label:
            text: calcs.profit1.toFixed(0)
      - Point:
          coordinates: [ params.q1, calcs.P ]
          color: green
          r: 0
          droplines:
            horizontal: calcs.P.toFixed(0)
      - Point:
          coordinates: [params.q1, calcs.P]
          droplines:
            vertical: params.q1.toFixed(0)
          drag:
          - horizontal: q1
      - Label:
          coordinates: [AXIS, 1]
          text: "1"
          color: marginalCost
          fontSize: 10
      - Label:
          coordinates: [100, AXIS]
          text: q_1
      - Label:
          coordinates: [AXIS, 110]
          text: P

    leftControls:
      title: Firm 1
      description: Firm 1's residual demand shifts left as firm 2 produces more.
      checkboxes:
      - param: showMR1
        label: \text{Show marginal revenue}
      divs:
        - html: "`$$\\\\color{${colors.blue}}P(q_1 | q_2) = (100 - q_2) - q_1 = ${calcs.resInt1.toFixed(0)} - q_1$$`"
          show: (params.q2 < 100)
        - html: "Firm 2 is flooding the market — no residual demand."
          show: (params.q2 >= 100)
        - html: "`Profit: $\\\\pi_1 = (P - 1)q_1 = ${calcs.profit1.toFixed(0)}$`"

    middleGraph:
      xAxis:
        max: 100
        ticks: 0
      yAxis:
        ticks: 0
        max: 110
      objects:
      - EconLinearMonopoly:
          demand:
            xIntercept: calcs.resInt2
            invSlope: -1
            label:
              x: 2
              position: bl
              text: P(q_2 | q_1)
            marginalRevenue:
              show: params.showMR2
              label:
                y: 2
                text: MR_2
          cost:
            yIntercept: 1
            label:
              x: 95
              text: MC_2
      - Rectangle:
          a: [0, 1]
          b: [params.q2, calcs.P]
          fill: green
          show: (calcs.profit2 > 0)
          label:
            text: calcs.profit2.toFixed(0)
      - Rectangle:
          a: [0, 1]
          b: [params.q2, calcs.P]
          fill: red
          show: (calcs.profit2 < 0)
          label:
            text: calcs.profit2.toFixed(0)
      - Point:
          coordinates: [ params.q2, calcs.P ]
          color: green
          r: 0
          droplines:
            horizontal: calcs.P.toFixed(0)
      - Point:
          coordinates: [params.q2, calcs.P]
          droplines:
            vertical: params.q2.toFixed(0)
          drag:
          - horizontal: q2
      - Label:
          coordinates: [AXIS, 1]
          text: "1"
          color: marginalCost
          fontSize: 10
      - Label:
          coordinates: [100, AXIS]
          text: q_2
      - Label:
          coordinates: [AXIS, 110]
          text: P
      - Segment:
          a: [params.q2, calcs.P]
          b: [100, calcs.P]
          color: green
          lineStyle: dotted
          label:
            text: \text{MARKET PRICE}
            position: b
            fontSize: 8

    middleControls:
      title: Firm 2
      description: Firm 2's residual demand shifts left as firm 1 produces more.
      checkboxes:
      - param: showMR2
        label: \text{Show marginal revenue}
      divs:
      - html: "`$$\\\\color{${colors.blue}}P(q_2 | q_1) = (100 - q_1) - q_2 = ${calcs.resInt2.toFixed(0)} - q_2$$`"
        show: (params.q1 < 100)
      - html: "Firm 1 is flooding the market — no residual demand."
        show: (params.q1 >= 100)
      - html: "`Profit: $\\\\pi_2 = (P - 1)q_2 = ${calcs.profit2.toFixed(0)}$`"

    rightGraph:
      xAxis:
        max: 110
        ticks: 0
      yAxis:
        max: 110
        ticks: 0
      objects:
       - EconLinearDemand:
          xIntercept: 100
          invSlope: -1
          label:
            x: 85
            text: P(Q) = 100 - Q
            position: bl
       - Point:
           coordinates: [calcs.Q, calcs.P]
           color: green
           r: 0
           droplines:
             horizontal: calcs.P.toFixed(0)
       - Point:
          coordinates: [calcs.Q, calcs.P]
          droplines:
            vertical: calcs.Q.toFixed(0)
       - Point:
          show: params.showqs
          coordinates: [params.q1, calcs.P]
          r: 0
          droplines:
            vertical:
       - Arrow:
          show: (params.showqs && (params.q1 > 0))
          begin: [0, (0.5*calcs.P)]
          end: [params.q1, (0.5*calcs.P)]
          color: blue
          label:
            text: q_1
       - Arrow:
          show: (params.showqs && (params.q2 > 0))
          begin: [params.q1, (0.5*calcs.P)]
          end: [calcs.Q, (0.5*calcs.P)]
          color: red
          label:
            text: q_2
       - Label:
          coordinates: [110, AXIS]
          text: Q
       - Label:
          coordinates: [AXIS, 110]
          text: P

    rightControls:
      title: Market
      description: Total output is the sum of both firms' quantities.
      checkboxes:
      - param: showqs
        label: \text{Show individual quantities}
      divs:
        - html: "`$$Q = q_1 + q_2 = ${calcs.Q.toFixed(0)}, \\\\quad P = ${calcs.P.toFixed(0)}$$`"
        - html: "`$$\\\\pi_1 = ${calcs.profit1.toFixed(0)}, \\\\quad \\\\pi_2 = ${calcs.profit2.toFixed(0)}$$`"
