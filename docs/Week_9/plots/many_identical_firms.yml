schema: EconSchema
params:
  - { name: w, value: 4, min: 1, max: 10 }
  - { name: r, value: 2, min: 1, max: 10 }
  - { name: K, value: 2, min: 1, max: 10 }
  - { name: N, value: 16, min: 1, max: 25 }
  - { name: p, value: 15, min: 1, max: 30 }
calcs:
  q: (4*params.K*params.p*params.p/(9*params.w*params.w))
  S: (calcs.q*params.N)
layout:
  TwoHorizontalGraphsPlusSidebar:
    leftGraph:
      xAxis:
        ticks: 0
        max: 15
      yAxis:
        max: 35
        ticks: 0
      objects:

        - Label:
            coordinates: [ AXIS, 35 ]
            text: p

        - Label:
            coordinates: [ 15, AXIS ]
            text: q^j

        - Curve:
            fn: (1.5*params.w/sqrt(params.K))*sqrt(x)
            color: supply
            label:
              y: 32
              text: s(p)
              position: tl
              bgcolor: none

        - Label:
            coordinates: [ AXIS, params.p ]
            color: budget
            text: params.p.toFixed(0)

        - Line:
            yIntercept: params.p
            color: budget
            label:
              text: p
              x: 14
            drag:
              - vertical: p

        - Point:
            coordinates: [ calcs.q, params.p ]
            droplines:
              vertical: calcs.q.toFixed(2)

    leftControls:
      title: Supply by each firm
      divs:
        - html: "`From $f(L,K) = L^{2/3}K^{1/3}$:`"
        - html: "`$$\\\\begin{aligned}s(p) &= {4\\\\overline{K} \\\\over 9w^2} p^2\\\\\\\\ &= {4 \\\\times ${params.K.toFixed(0)} \\\\over 9 \\\\times ${params.w.toFixed(0)}^2} \\\\times ${params.p.toFixed(0)}^2 \\\\\\\\ &=${calcs.q.toFixed(2)}\\\\end{aligned}$$`"

    rightGraph:
      xAxis:
        max: 300
        ticks: 0
      yAxis:
        max: 35
        ticks: 0
      objects:

        - Label:
            coordinates: [ AXIS, 35 ]
            text: p

        - Label:
            coordinates: [ 300, AXIS ]
            text: Q

        - Curve:
            fn: (1.5*params.w)*sqrt((x)/(params.N*params.K))
            color: supply
            label:
              y: 32
              text: S(p)
              position: tl
              bgcolor: none

        - Line:
            yIntercept: params.p
            color: budget
            label:
              text: p
              x: 280
            drag:
              - vertical: p
        - Point:
            coordinates: [ calcs.S, params.p ]
            droplines:
              vertical: calcs.S.toFixed(0)

    rightControls:
      title: Market Supply
      divs:
        - html: "`$$\\\\begin{aligned}S(p) &= N_F \\\\times s(p)\\\\\\\\ &= ${params.N} \\\\times ${calcs.q.toFixed(2)}\\\\\\\\ &= ${calcs.S.toFixed(0)}\\\\end{aligned}$$`"

    sidebar:
      controls:
        - title: Market Supply with Identical Firms
          description: The left graph shows the quantity supplied by each firm at each price. The right graph multiplies this amount by the number of firms to get the total quantity supplied in the market.
          sliders:
            - param: p
              label: p
            - param: w
              label: w
            - param: K
              label: \overline K
            - param: N
              label: N_F
