schema: EconSchema
colors:
  marginalCost: colors.orange
  averageCost: colors.purple
  variableCost: colors.gray
  totalCost: colors.red
params:
  - name: p
    value: 10
    min: 6
    max: 25
    round: 0.25
calcs:
  q: ((10 + sqrt(12*params.p - 68))/6)
  qLow: ((10 - sqrt(12*params.p - 68))/6)
  tc: (5 + 14*calcs.q - 5*(calcs.q)^2 + (calcs.q)^3)
  tcLow: (5 + 14*calcs.qLow - 5*(calcs.qLow)^2 + (calcs.qLow)^3)
  mc: (14 - 10*calcs.q + 3*calcs.q*calcs.q)
  vc: (calcs.tc - 5)
  ac: (calcs.tc/calcs.q)
  avc: (calcs.vc/calcs.q)
  tr: (calcs.q * params.p)
  profit: (calcs.tr - calcs.tc)
  profitLow: (params.p*calcs.qLow - calcs.tcLow)
layout:
  TwoVerticalGraphsPlusSidebar:
    topGraph:
      yAxis:
        title: Dollars
        max: 150
        min: -50
      xAxis:
        max: 8
        ticks: 0
      objects:

        # Variable Cost
        - Curve:
            fn: 14*(x) - 5*(x)^2 + (x)^3
            color: variableCost
            label:
              text: VC
              x: 7
              position: bl
              bgcolor: none

        - Point:
            coordinates: [ calcs.q, calcs.vc ]
            color: variableCost
            r: 4
            droplines:
              vertical:

        # Total Revenue
        - Line:
            slope: params.p
            color: green
            label:
              text: TR
              x: 7
              position: tl

        - Point:
            coordinates: [ calcs.q, calcs.tr ]
            color: green
            r: 4
            droplines:
              vertical:

        # Profit
        - Curve:
            fn: params.p*(x) - (5 + 14*(x) - 5*(x)^2 + (x)^3)
            color: purple
            label:
              text: \text{Profit/Loss}
              x: max(6, calcs.q + 1)
              position: bl
              bgcolor: none

        - Point:
            coordinates: [8, -5]
            color: purple
            r: 0
            droplines:
              horizontal: -FC
            label:
              text: \text{Loss if shut down}
              position: r

        - Point:
            coordinates: [ calcs.q, calcs.profit ]
            color: purple
            r: 4
            droplines:
              vertical:
              horizontal:


    bottomGraph:
      yAxis:
        title: Dollars per Unit
        max: 25
      xAxis:
        title: Output ($q$)
        max: 8
        ticks: 8
      objects:

        # Average variable cost
        - Curve:
            fn: 14 - 5*(x) + (x)^2
            color: variableCost
            label:
              text: AVC
              x: 1.5
              position: bl
              bgcolor: none

        # Marginal cost
        - Curve:
            fn: 14 - 10*(x) + 3*(x)^2
            color: marginalCost
            label:
              text: MC
              x: 7
              position: bl
              bgcolor: none

        # Average revenue
        - Line:
            yIntercept: params.p
            color: demand
            drag:
              - vertical: p
            label:
              text: MR = AR
              x: 8
              position: tr
              bgcolor: none

        - Point:
            coordinates: [ calcs.q, params.p ]
            color: demand
            r: 4
            drag:
              - vertical: p
            droplines:
              vertical:
              horizontal: "`p = ${params.p.toFixed(1)}`"



    sidebar:
      controls:
        - title: Shutdown Condition
          description: Lower the price to see when the firm should shut down.
          sliders:
            - param: p
              label: p
          divs:
            - html: "`$c(q) = 5 + 14q - 5q^2 + q^3$. Shutdown price: $\\\\min AVC = 7.75$ at $q = 2.5$.`"
