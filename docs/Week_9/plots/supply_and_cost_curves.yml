schema: EconSchema
colors:
  marginalCost: colors.orange
  averageCost: colors.purple
  variableCost: colors.gray
  totalCost: colors.red
params:
  - name: p
    value: 15
    min: 1
    max: 25
    round: 0.5
  - name: s
    value: 1
calcs:
  q: ((10 + sqrt(12*params.p - 68))/6)
  qLow: ((10 - sqrt(12*params.p - 68))/6)
  tc: (5 + 14*calcs.q - 5*(calcs.q)^2 + (calcs.q)^3)
  tcLow: (5 + 14*calcs.qLow - 5*(calcs.qLow)^2 + (calcs.qLow)^3)
  mc: (14 - 10*calcs.q + 3*calcs.q*calcs.q)
  vc: (calcs.tc - 5)
  ac: (calcs.tc/calcs.q)
  avc: (calcs.vc/calcs.q)
  tr: (calcs.q * params.p)
  profit: (calcs.tr - calcs.tc)
  profitLow: (params.p*calcs.qLow - calcs.tcLow)
layout:
  OneGraphPlusSidebar:
    graph:
      yAxis:
        title: Dollars per unit / Price
        max: 25
      xAxis:
        title: Output ($q$)
        max: 8
        ticks: 8
      objects:
        # Supply (MC above min AVC)
        - Curve:
            fn: 14 - 10*(x) + 3*(x)^2
            color: marginalCost
            strokeWidth: 4
            min: 2.5
            label:
              text: \text{Supply}
              x: 7
              position: bl
              bgcolor: none

        - Segment:
            a: [0, 0]
            b: [0, 7.75]
            strokeWidth: 6
            color: supply

        - Segment:
            a: [ 2.5, 7.75 ]
            b: [ 0, 7.75 ]
            lineStyle: dashed
            color: supply

        # Average variable cost
        - Curve:
            fn: 14 - 5*(x) + (x)^2
            color: variableCost
            show: true
            lineStyle: dotted
            label:
              text: AVC
              x: 1.5
              position: bl
              bgcolor: none

        # Marginal cost (full curve)
        - Curve:
            fn: 14 - 10*(x) + 3*(x)^2
            color: marginalCost
            show: true
            lineStyle: dotted
            label:
              text: MC
              x: 2
              position: tr
              bgcolor: none

        # Price line
        - Line:
            yIntercept: params.p
            color: green
            drag:
              - vertical: p
            label:
              text: \text{Price}
              x: 8
              position: tr
              bgcolor: none

        # Supply point
        - Point:
            coordinates:
            x: "((params.p < 7.75) ? 0 : calcs.q)"
            y: params.p
            color: supply
            drag:
              - vertical: p
            droplines:
              vertical:



    sidebar:
      controls:
        - title: Supply and Cost Curves
          description: The supply curve is the portion of MC above minimum AVC, plus zero output below.
          sliders:
            - param: p
              label: p
          divs:
            - html: "`$c(q) = 5 + 14q - 5q^2 + q^3$. Supply = MC above $\\\\min AVC = 7.75$.`"
