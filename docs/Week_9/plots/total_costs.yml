schema: EconSchema
colors:
  fixedCost: colors.green
  variableCost: colors.grey
  totalCost: colors.red
params:
  - {name: w, value: 4, min: 1, max: 10}
  - {name: r, value: 2, min: 1, max: 5}
  - {name: K, value: 36, min: 16, max: 64}
  - {name: q, value: 12, min: 0, max: 50}
calcs:
  L: (params.q^1.5 / sqrt(params.K))
  VC: (params.w * calcs.L)
  F: (params.r * params.K)
  TC: (calcs.VC + calcs.F)
layout:
  OneGraphPlusSidebar:
    graph:
      yAxis:
        title: Dollars
        max: 500
        ticks: 0
      xAxis:
        title: Output ($q$)
        max: 50
        ticks: 0
      objects:

      # Total Cost
      - Curve:
          fn: calcs.F + (params.w/sqrt(params.K))*(x)^1.5
          color: colors.totalCost
          label:
            text: TC
            x: 45

      - Point:
          coordinates: [ params.q, calcs.TC ]
          color: totalCost
          drag:
            - horizontal: q
          droplines:
            vertical: params.q.toFixed(0)
            horizontal: calcs.TC.toFixed(0)

      # Variable Cost
      - Curve:
          fn: (params.w/sqrt(params.K))*(x)^1.5
          color: colors.variableCost
          label:
            text: VC
            x: 45

      - Point:
          coordinates: [ params.q, calcs.VC ]
          color: colors.variableCost
          drag:
            - horizontal: q
          droplines:
            horizontal: calcs.VC.toFixed(0)

      # Fixed Cost
      - Line:
          yIntercept: calcs.F
          color: colors.fixedCost

      - Label:
          coordinates: [AXIS, calcs.F]
          color: colors.fixedCost
          text: calcs.F

    sidebar:
      controls:
        - title: Total Costs
          description: Drag the point to see how total, variable, and fixed costs change with output.
          sliders:
          - param: w
            label: w
          - param: r
            label: r
          - param: K
            label: \overline K
          divs:
            - html: "`From $f(L,K) = L^{2/3}K^{1/3}$: $$TC = r\\\\overline{K} + w \\\\cdot q^{3/2}/\\\\sqrt{\\\\overline{K}}$$`"
