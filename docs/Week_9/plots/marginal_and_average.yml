schema: EconSchema
colors:
  marginalCost: colors.orange
  averageCost: colors.purple
  totalCost: colors.red
  variableCost: colors.gray
params:
  - {name: q, value: 4, min: 0.5, max: 8, round: 0.1}
calcs:
  tc: (5 + 14*params.q - 5*params.q^2 + params.q^3)
  vc: (14*params.q - 5*params.q^2 + params.q^3)
  mc: (14 - 10*params.q + 3*params.q^2)
  ac: (5/params.q + 14 - 5*params.q + params.q^2)
  avc: (14 - 5*params.q + params.q^2)

layout:
  TwoVerticalGraphsPlusSidebar:
    topGraph:
      yAxis:
        title: Total Cost (\$)
        max: 250
        ticks: 0
      xAxis:
        title: Output ($q$)
        max: 8
        ticks: 0
      objects:

      # Total cost curve
      - Curve:
          fn: 5 + 14*(x) - 5*(x)^2 + (x)^3
          color: shortRun
          label:
            text: TC
            x: 7.5

      - Point:
          coordinates: [params.q, calcs.tc]
          color: shortRun
          drag:
          - horizontal: q
          droplines:
            vertical: params.q.toFixed(1)
            horizontal: calcs.tc.toFixed(0)

      # MC as slope of TC
      - Line:
         point: [params.q, calcs.tc]
         slope: calcs.mc
         lineStyle: dotted
         color: marginalCost
         label:
           text: "`slope = MC`"
           x: 7
           position: tl
           bgColor: none

      # AC as slope of ray from origin
      - Line:
          point: [params.q, calcs.tc]
          color: averageCost
          lineStyle: dotted
          label:
            text: "`slope = AC`"
            x: 6
            position: tl
            bgcolor: none

    bottomGraph:
      yAxis:
        title: Unit Cost (\$/unit)
        max: 30
      xAxis:
        title: Output ($q$)
        max: 8
      objects:

      # Average cost
      - Curve:
          fn: 5/(x) + 14 - 5*(x) + (x)^2
          color: averageCost
          label:
            text: AC
            x: 7.5

      - Point:
          coordinates: [params.q, calcs.ac]
          color: averageCost
          drag:
          - horizontal: q
          droplines:
            vertical:
            horizontal: calcs.ac.toFixed(2)

      # Average variable cost
      - Curve:
          fn: 14 - 5*(x) + (x)^2
          color: variableCost
          label:
            text: AVC
            x: 7.5
            position: bl
            bgcolor: none

      - Point:
          coordinates: [params.q, calcs.avc]
          color: variableCost
          drag:
          - horizontal: q
          droplines:
            horizontal: calcs.avc.toFixed(2)

      # Marginal cost
      - Curve:
          fn: 14 - 10*(x) + 3*(x)^2
          color: marginalCost
          label:
            text: MC
            x: 7.5

      - Point:
          coordinates: [params.q, calcs.mc]
          color: marginalCost
          drag:
          - horizontal: q
          droplines:
            vertical: params.q.toFixed(1)
            horizontal: calcs.mc.toFixed(2)

      # Min AVC point
      - Point:
          coordinates: [2.5, 7.75]
          color: variableCost
          r: 5
          label:
            text: "`\\\\min AVC = 7.75`"
            position: br

    sidebar:
      controls:
        - title: Marginal and Average Costs
          description: MC crosses AVC at its minimum. Drag the slider to verify.
          sliders:
          - param: q
            label: q
          divs:
          - html: "`$c(q) = 5 + 14q - 5q^2 + q^3$. $\\\\min AVC = 7.75$ at $q = 2.5$.`"
          - html: "`$$\\\\textcolor{${colors.red}}{TC(${params.q.toFixed(1)}) = ${calcs.tc.toFixed(1)}}$$`"
          - html: "`$$\\\\textcolor{${colors.purple}}{AC(${params.q.toFixed(1)}) = ${calcs.ac.toFixed(2)}}$$`"
          - html: "`$$\\\\textcolor{${colors.gray}}{AVC(${params.q.toFixed(1)}) = ${calcs.avc.toFixed(2)}}$$`"
          - html: "`$$\\\\textcolor{${colors.orange}}{MC(${params.q.toFixed(1)}) = ${calcs.mc.toFixed(2)}}$$`"
