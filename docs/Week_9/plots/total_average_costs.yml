schema: EconSchema
colors:
  fixedCost: colors.green
  variableCost: colors.grey
  totalCost: colors.red
params:
  - {name: w, value: 4, min: 1, max: 10}
  - {name: r, value: 2, min: 1, max: 5}
  - {name: K, value: 36, min: 16, max: 64}
  - {name: q, value: 12, min: 1, max: 50}
calcs:
  L: (params.q^1.5 / sqrt(params.K))
  VC: (params.w * calcs.L)
  F: (params.r * params.K)
  TC: (calcs.VC + calcs.F)
  AVC: (params.w * sqrt(params.q) / sqrt(params.K))
  AFC: (calcs.F / params.q)
  ATC: (calcs.AVC + calcs.AFC)
layout:
  TwoVerticalGraphsPlusSidebar:
    topGraph:
      yAxis:
        title: Dollars
        max: 500
        ticks: 0
      xAxis:
        title: Output ($q$)
        max: 50
        ticks: 0
      objects:

      # Total Cost
      - Curve:
          fn: calcs.F + (params.w/sqrt(params.K))*(x)^1.5
          color: colors.totalCost
          label:
            text: TC
            x: 45

      - Point:
          coordinates: [ params.q, calcs.TC ]
          color: totalCost
          drag:
            - horizontal: q
          droplines:
            vertical: params.q.toFixed(0)
            horizontal: calcs.TC.toFixed(0)

      # Variable Cost
      - Curve:
          fn: (params.w/sqrt(params.K))*(x)^1.5
          color: colors.variableCost
          label:
            text: VC
            x: 45

      - Point:
          coordinates: [ params.q, calcs.VC ]
          color: colors.variableCost
          drag:
            - horizontal: q
          droplines:
            horizontal: calcs.VC.toFixed(0)

      # Fixed Cost
      - Line:
          yIntercept: calcs.F
          color: colors.fixedCost

      - Label:
          coordinates: [AXIS, calcs.F]
          color: colors.fixedCost
          text: calcs.F

    bottomGraph:
      yAxis:
        title: Dollars per Unit
        max: 20
        ticks: 0
      xAxis:
        title: Output ($q$)
        max: 50
        ticks: 0
      objects:

        # Average Total Cost
        - Curve:
            fn: calcs.F/(x) + (params.w/sqrt(params.K))*sqrt(x)
            color: colors.totalCost
            label:
              text: ATC
              x: 45

        - Point:
            coordinates: [ params.q, calcs.ATC ]
            color: totalCost
            drag:
              - horizontal: q
            droplines:
              vertical: params.q.toFixed(0)
              horizontal: calcs.ATC.toFixed(2)

        # Average Variable Cost
        - Curve:
            fn: (params.w/sqrt(params.K))*sqrt(x)
            color: colors.variableCost
            label:
              text: AVC
              x: 45

        - Point:
            coordinates: [ params.q, calcs.AVC ]
            color: colors.variableCost
            drag:
              - horizontal: q
            droplines:
              horizontal: calcs.AVC.toFixed(2)

        # Average Fixed Cost
        - Curve:
            fn: calcs.F/(x)
            color: colors.fixedCost
            label:
              text: AFC
              x: 45

        - Point:
            coordinates: [ params.q, calcs.AFC ]
            color: colors.fixedCost
            drag:
              - horizontal: q
            droplines:
              horizontal: calcs.AFC.toFixed(2)

    sidebar:
      controls:
        - title: Total and Average Costs
          sliders:
          - param: w
            label: w
          - param: r
            label: r
          - param: K
            label: \overline K
          divs:
            - html: "`From $f(L,K) = L^{2/3}K^{1/3}$.`"
            - html: "`$$\\\\textcolor{${colors.red}}{TC(${params.q}) = ${calcs.TC.toFixed(0)} \\\\Rightarrow ATC = ${calcs.ATC.toFixed(2)}}$$`"
            - html: "`$$\\\\textcolor{${colors.grey}}{VC(${params.q}) = ${calcs.VC.toFixed(0)} \\\\Rightarrow AVC = ${calcs.AVC.toFixed(2)}}$$`"
            - html: "`$$\\\\textcolor{${colors.green}}{FC = ${calcs.F.toFixed(0)} \\\\Rightarrow AFC = ${calcs.AFC.toFixed(2)}}$$`"
