---
schema: EconSchema
version: 1
params:
  - name: p
    value: 60
    min: 10
    max: 100
  - name: tax
    value: 0
    min: 0
    max: 20
    round: 2
calcs:
  pc: (params.p + params.tax)
layout:
  type: OneGraphPlusSidebar
  def:
    graph:
      xAxis:
        title: Quantity ($Q$)
        orient: bottom
        min: 0
        max: 150
        ticks: 0
      yAxis:
        title: Price ($P$)
        orient: left
        min: 0
        max: 150
        ticks: 0
      objects:
        - EconLinearDemand:
            name: originalDemand
            xIntercept: 120
            strokeWidth: 0.5
            invSlope: -1
            pts: [{name: qd, x: calcs.demand.qd.x}]
            label:
              text: D(P)
              x: 80
        - EconLinearDemand:
            name: demand
            xIntercept: (120 - params.tax)
            invSlope: -1
            pts: [{name: qd, y: params.p}]
            label:
              text: D(P,t)
              x: 80
        - EconLinearSupply:
            name: supply
            pts: [{name: qs, y: params.p}]
            slope: 1
            label:
              text: S
              x: 140
        - Line:
            yIntercept: params.p
            color: green
            lineStyle: dotted
            drag:
              - vertical: p
            label:
              text: List Price
              position: l
              plainText: true
              x: 115
        - Line:
            yIntercept: calcs.pc
            show: (params.tax > 0)
            color: blue
            lineStyle: dotted
            drag:
              - vertical: p
            label:
              text: Price Consumers Pay
              position: l
              plainText: true
              x: 115
        - Point:
            coordinates: [60,60]
            color: lightgrey
            r: 0
            droplines:
              horizontal:
              vertical:
        - Point:
            x: calcs.demand.qd.x
            y: calcs.demand.qd.y
            color: demand
            show: (calcs.supply.qs.x != calcs.demand.qd.x)
        - Point:
            x: calcs.demand.qd.x
            y: calcs.originalDemand.qd.y
            r: 4
            color: demand
            droplines:
              vertical: D(P,t)
        - Point:
            x: calcs.supply.qs.x
            y: calcs.supply.qs.y
            color: supply
            show: (calcs.supply.qs.x != calcs.demand.qd.x)
            droplines:
              vertical: S(P)
        - Point:
            x: calcs.demand.qd.x
            y: calcs.demand.qd.y
            color: green
            show: (calcs.demand.qd.x == calcs.supply.qs.x)
            droplines:
              vertical: "`D(P,t) = S(P)`"
        - Point:
            x: calcs.supply.qs.x
            y: calcs.supply.qs.y
            color: green
            show: (calcs.demand.qd.x == calcs.supply.qs.x)
        - Label:
            coordinates: [AXIS, params.p]
            color: green
            text: P
        - Label:
            coordinates: [AXIS, calcs.pc]
            color: demand
            text: P + t
            show: (params.tax > 0)
        - Arrow:
            begin: [110, params.p]
            end: [110, calcs.pc]
            show: (params.tax > 0)
            trim: 0.1
            color: green
            label:
              text: t
              position: r
              bgcolor: none
        - Arrow:
            begin: [80, 40]
            end: [80, (40 - params.tax)]
            show: (params.tax > 0)
            trim: 0.1
            color: blue
            label:
              text: t
              position: l
              bgcolor: none
        # Excess supply / excess demand
        - Segment:
            a: [calcs.demand.qd.x,20]
            b: [calcs.supply.qs.x,20]
            show: (calcs.supply.qs.x > calcs.demand.qd.x)
            startArrow: true
            endArrow: true
            color: colors.supply
            label:
              text: "\\begin{matrix}\\text{EXCESS} \\\\ \\text{SUPPLY}\\end{matrix}"
              fontSize: 7
              bgcolor: none
              yPixelOffset: -15

        - Segment:
            a: [calcs.demand.qd.x,20]
            b: [calcs.supply.qs.x,20]
            show: (calcs.supply.qs.x < calcs.demand.qd.x)
            startArrow: true
            endArrow: true
            color: colors.demand
            label:
              text: "\\begin{matrix}\\text{EXCESS} \\\\ \\text{DEMAND}\\end{matrix}"
              fontSize: 7
              yPixelOffset: -15


        - Arrow:
            begin: [5,60]
            end: [5, calcs.pc]
            show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))
            color: demand
            label:
              text: Consumers pay more
              plainText: true
              position: l
        - Arrow:
            begin: [5,60]
            end: [5, params.p]
            show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))
            color: supply
            label:
              text: Firms get less
              plainText: true
              position: l

    sidebar:
      controls:
        - title: Demand Shift Representation of a Tax
          sliders:
            - param: tax
              label: \text{Tax}
              showNumber: false
          divs:
            - html: With no tax imposed, buyers and sellers face a common price, $P$.
            - html: '<b>Impose a tax by dragging the "tax" slider to the right.</b>'
              show: (params.tax == 0)
            - html: "When a tax is imposed on consumers, they now pay $P+t$ rather than $P$; so at any list price, they demand less. This 'shifts' the demand curve down by $t$."
              show: (params.tax > 0)
            - html: "At the initial market price, this means there is an excess supply, as consumers are less willing to buy goods at the price they face. This causes <i>downward pressure</i> on prices."
              show: ((params.tax > 0) && (params.p == 60))
            - html: <b>Adjust the price firms charge until the quantity demanded equals the quantity supplied by dragging the horizontal line.</b>
              show: (calcs.supply.qs.x != calcs.demand.qd.x)
            - html: The system converges to the point at which the quantity demanded equals the quantity supplied at the market (list) price. However, consumers pay that amount plus the tax.
              show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))