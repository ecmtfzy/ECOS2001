schema: EconSchema
colors:
  fixedCost: colors.green
  variableCost: colors.grey
  totalCost: colors.red
params:
  - {name: w, value: 4, min: 1, max: 10}
  - {name: r, value: 2, min: 1, max: 5}
  - {name: K, value: 36, min: 16, max: 64}
  - {name: q, value: 12, min: 1, max: 50}
calcs:
  L: (params.q^1.5 / sqrt(params.K))
  VC: (params.w * calcs.L)
  F: (params.r * params.K)
  TC: (calcs.VC + calcs.F)
  MC: (1.5 * params.w * sqrt(params.q) / sqrt(params.K))
  MPL: (params.w / calcs.MC)
layout:
  TwoHorizontalGraphsPlusSidebar:
    leftGraph:
      xAxis:
        title: Labor ($L$)
        max: 50
        ticks: 0
      yAxis:
        title: Output ($q$)
        max: 50
        ticks: 0
      objects:
        - Curve:
            fn: (x)^(2/3) * params.K^(1/3)
            samplePoints: 500
            label:
              text: "`f(L|\\\\overline{K})`"
              x: 40
              color: production
              position: tl
        - Point:
            coordinates: [calcs.L, params.q]
            drag:
              - vertical: q
            droplines:
              vertical: L
              horizontal: q
        - Line:
            point: [calcs.L, params.q]
            slope: calcs.MPL
            ind: y
            color: mpl
            label:
              text: MP_L
              y: 45
              position: br

    rightGraph:
      yAxis:
        title: Dollars
        max: 500
        ticks: 0
      xAxis:
        title: Output ($q$)
        max: 50
        ticks: 0
      objects:

      # Total Cost
      - Curve:
          fn: calcs.F + (params.w/sqrt(params.K))*(x)^1.5
          color: colors.totalCost
          label:
            text: c(q)
            x: 45
            position: br

      - Point:
          coordinates: [ params.q, calcs.TC ]
          color: totalCost
          drag:
            - horizontal: q
          droplines:
            vertical: q
            horizontal: TC

      - Line:
          point: [ params.q, calcs.TC ]
          slope: calcs.MC
          color: marginalCost
          label:
            text: MC
            x: params.q + 10
            position: tl


    sidebar:
      controls:
        - title: Relationship between MPL and MC
          sliders:
          - param: w
            label: w
          - param: r
            label: r
          - param: K
            label: \overline K
          divs:
            - html: "`Production function: $f(L,K) = L^{2/3}K^{1/3}$.`"
            - html: "`The $MC$ and the $MP_L$ are inversely related: $$MC = w \\\\times {1 \\\\over MP_L}$$`"
