schema: EconSchema
params:
- {name: K, value: 36, min: 16, max: 64, round: 1}
calcs:
  L1: (8/sqrt(params.K))
  L2: (27/sqrt(params.K))
  L3: (64/sqrt(params.K))
layout:
  TwoVerticalGraphsPlusSidebar:
    topGraph:
      xAxis:
        max: 30
        ticks: 0
        title: Labor ($L$)
      yAxis:
        max: 70
        ticks: 0
        title: Capital ($K$)
      objects:

      - Line:
          yIntercept: params.K
          color: red
          drag:
            - vertical: K
          label:
            x: 29
            text: \text{SR Expansion Path}

      - EconBundle:
          name: X3
          color: red
          coordinates: [calcs.L1, params.K]
          r: 4
          label:
            text:
          utilityFunction:
            CobbDouglas:
              coefficients: [1]
              exponents: [0.6667,0.3333]
            samplePoints: 500
          droplines:
            vertical: calcs.L1.toFixed(1)
          indifferenceCurve:
            color: blue
            label:
              text: "`q = 4`"
              x: 3
              position: bl

      - EconBundle:
          name: X4
          color: red
          coordinates: [calcs.L2, params.K]
          r: 4
          label:
            text:
          utilityFunction:
            CobbDouglas:
              coefficients: [1]
              exponents: [0.6667,0.3333]
            samplePoints: 500
          droplines:
            vertical: calcs.L2.toFixed(1)
          indifferenceCurve:
            color: blue
            label:
              text: "`q = 9`"
              x: 9
              position: bl

      - EconBundle:
          name: X5
          color: red
          coordinates: [calcs.L3, params.K]
          r: 4
          label:
            text:
          utilityFunction:
            CobbDouglas:
              coefficients: [1]
              exponents: [0.6667,0.3333]
            samplePoints: 500
          droplines:
            vertical: calcs.L3.toFixed(1)
            horizontal: "`\\\\overline K = ${params.K.toFixed(0)}`"
          indifferenceCurve:
            color: blue
            label:
              text: "`q = 16`"
              x: 20
              position: bl

    bottomGraph:
      xAxis:
        max: 30
        ticks: 0
        title: Labor ($L$)
      yAxis:
        max: 35
        ticks: 0
        title: Output ($q$)
      objects:
      - Label:
          text: "`f(L|\\\\overline{K}=${params.K})`"
          x: 20
          y: 32
          color: production
          position: tl
      - Curve:
          fn: (x)^(2/3) * params.K^(1/3)
          samplePoints: 500

      - Point:
          color: red
          coordinates: [calcs.L1, 4]
          r: 4
          droplines:
            vertical: calcs.L1.toFixed(1)
            horizontal: 4

      - Point:
          color: red
          coordinates: [calcs.L2, 9]
          r: 4
          droplines:
            vertical: calcs.L2.toFixed(1)
            horizontal: 9

      - Point:
          color: red
          coordinates: [calcs.L3, 16]
          r: 4
          droplines:
            vertical: calcs.L3.toFixed(1)
            horizontal: 16

    sidebar:
      controls:
      - title: Short-Run Expansion Path
        description: The top graph shows isoquants and the labor required at fixed capital. The bottom graph shows output as a function of labor.
        sliders:
        - param: K
          label: \overline K
        divs:
        - html: "`Production function: $f(L,K) = L^{2/3}K^{1/3}$`"
