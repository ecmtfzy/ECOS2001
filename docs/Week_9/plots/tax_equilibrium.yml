---
schema: EconSchema
version: 1
params:
  - name: p
    value: 60
    min: 10
    max: 100
  - name: tax
    value: 0
    min: 0
    max: 20
    round: 2
calcs:
  pc: (params.p + params.tax)
layout:
  type: OneGraphPlusSidebar
  def:
    graph:
      xAxis:
        title: Quantity ($Q$)
        orient: bottom
        min: 0
        max: 150
        ticks: 0
      yAxis:
        title: Price ($P$)
        orient: left
        min: 0
        max: 150
        ticks: 0
      objects:
        - EconLinearDemand:
            name: demand
            xIntercept: 120
            invSlope: -1
            pts: [{name: qd, y: calcs.pc}]
            label:
              text: D
              x: 100
        - EconLinearSupply:
            name: supply
            pts: [{name: qs, y: params.p}]
            slope: 1
            label:
              text: S
              x: 140
        - Line:
            yIntercept: params.p
            color: green
            lineStyle: dotted
            show: (params.tax == 0)
            drag:
              - vertical: p
            label:
              text: Market Price
              position: l
              plainText: true
              x: 115
        - Line:
            yIntercept: params.p
            show: (params.tax > 0)
            color: orange
            lineStyle: dotted
            drag:
              - vertical: p
            label:
              text: Price Firms Receive
              plainText: true
              position: l
              x: 115
        - Line:
            yIntercept: calcs.pc
            show: (params.tax > 0)
            color: blue
            lineStyle: dotted
            drag:
              - vertical: p
            label:
              text: Price Consumers Pay
              position: l
              plainText: true
              x: 115
        - Point:
            coordinates: [60,60]
            color: lightgrey
            r: 0
            droplines:
              horizontal:
              vertical:
        - Point:
            x: calcs.demand.qd.x
            y: calcs.demand.qd.y
            color: demand
            show: (calcs.supply.qs.x != calcs.demand.qd.x)
            droplines:
              vertical: D(P_C)
        - Point:
            x: calcs.supply.qs.x
            y: calcs.supply.qs.y
            color: supply
            show: (calcs.supply.qs.x != calcs.demand.qd.x)
            droplines:
              vertical: S(P_F)
        - Point:
            x: calcs.demand.qd.x
            y: calcs.demand.qd.y
            color: green
            show: (calcs.demand.qd.x == calcs.supply.qs.x)
            droplines:
              vertical: "`D(P_C) = S(P_F)`"
        - Point:
            x: calcs.supply.qs.x
            y: calcs.supply.qs.y
            color: green
            show: (calcs.demand.qd.x == calcs.supply.qs.x)
        - Label:
            coordinates: [AXIS, params.p]
            color: green
            text: "P_C = P_F = P"
            show: (params.tax == 0)
        - Label:
            coordinates: [AXIS, params.p]
            color: supply
            text: P_F
            show: (params.tax > 0)
        - Label:
            coordinates: [AXIS, calcs.pc]
            color: demand
            text: P_C
            show: (params.tax > 0)
        - Segment:
            a: [110, params.p]
            b: [110, calcs.pc]
            show: (params.tax > 0)
            startArrow: true
            endArrow: true
            color: green
            label:
              text: tax
              plainText: true
              position: r
              bgcolor: none
              # Excess supply / excess demand
        - Segment:
            a: [calcs.demand.qd.x,20]
            b: [calcs.supply.qs.x,20]
            show: (calcs.supply.qs.x > calcs.demand.qd.x)
            startArrow: true
            endArrow: true
            color: colors.supply
            label:
              text: "\\begin{matrix}\\text{EXCESS} \\\\ \\text{SUPPLY}\\end{matrix}"
              fontSize: 7
              bgcolor: none
              yPixelOffset: -15

        - Segment:
            a: [calcs.demand.qd.x,20]
            b: [calcs.supply.qs.x,20]
            show: (calcs.supply.qs.x < calcs.demand.qd.x)
            startArrow: true
            endArrow: true
            color: colors.demand
            label:
              text: "\\begin{matrix}\\text{EXCESS} \\\\ \\text{DEMAND}\\end{matrix}"
              fontSize: 7
              yPixelOffset: -15


        - Arrow:
            begin: [5,60]
            end: [5, calcs.pc]
            show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))
            color: demand
            label:
              text: Consumers pay more
              plainText: true
              position: l
        - Arrow:
            begin: [5,60]
            end: [5, params.p]
            show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))
            color: supply
            label:
              text: Firms get less
              plainText: true
              position: l

    sidebar:
      controls:
        - title: Equilibrium Effects of a Tax
          sliders:
            - param: tax
              label: \text{Tax}
              showNumber: false
          divs:
            - html: With no tax imposed, buyers and sellers face a common price, $P$.
            - html: '<b>Impose a tax by dragging the "tax" slider to the right.</b>'
              show: (params.tax == 0)
            - html: "When a tax is imposed, buyers pay $P_C$ but firms only receive $P_F$. The difference between these two values is the amount of the tax: $$P_C = P_F + \\text{tax}$$"
              show: (params.tax > 0)
            - html: "At the initial market price, this means there is an excess supply, as consumers are less willing to buy goods at the price they face. This causes <i>downward pressure</i> on prices."
              show: ((params.tax > 0) && (params.p == 60))
            - html: <b>Adjust the price firms charge until the quantity demanded equals the quantity supplied by dragging the horizontal line.</b>
              show: (calcs.supply.qs.x != calcs.demand.qd.x)
            - html: The system converges to an new equilibrium in which firms receive less than they did before the tax, consumers pay more, but once again they supply and demand the same quantity <i>at the prices they each face</i>. That quantity is <i>lower</i> due to the effect of the tax.
              show: ((params.tax > 0) && (calcs.supply.qs.x == calcs.demand.qd.x))