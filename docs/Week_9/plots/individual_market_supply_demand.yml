schema: EconSchema
params:
- {name: a, value: 0.25, min: 0.1, max: 0.9, round: 0.01}
- {name: m, value: 100, min: 10, max: 200, round: 10}
- {name: NC, value: 64, min: 10, max: 100}
- {name: w, value: 4, min: 1, max: 10}
- {name: r, value: 2, min: 1, max: 10}
- {name: K, value: 2, min: 1, max: 10}
- {name: NF, value: 16, min: 1, max: 25}
calcs:
  p: ((9*params.NC*params.a*params.m*params.w*params.w/(4*params.NF*params.K))^(1/3))
  x: (params.a*params.m/calcs.p)
  Q: (calcs.x*params.NC)
  q: (4*params.K*calcs.p*calcs.p/(9*params.w*params.w))
layout:
  ThreeHorizontalGraphs:
    leftGraph:
      xAxis:
        ticks: 0
        max: 10
      yAxis:
        max: 40
        ticks: 0
      objects:

      - Label:
          coordinates: [AXIS, 40]
          text: p

      - Label:
          coordinates: [10, AXIS]
          text: x^i

      - Curve:
          fn: (params.a*params.m/(y))
          color: demand
          ind: y
          label:
            y: 36
            text: d(p)
            position: tl
            bgcolor: none


      - Label:
          coordinates: [AXIS, calcs.p]
          color: budget
          text: calcs.p.toFixed(2)

      - Line:
          yIntercept: calcs.p
          color: budget
          lineStyle: dotted

      - Point:
          coordinates: [calcs.x, calcs.p]
          droplines:
            vertical: calcs.x.toFixed(2)

    leftControls:
      title: Individual Consumer Demand
      sliders:
        - param: a
          label: \alpha
        - param: m
          label: m
      divs:
      - html: "`$$\\\\begin{aligned}d(p^*) &= {\\\\alpha m \\\\over p^*}\\\\\\\\ &= {${params.a.toFixed(2)} \\\\times ${params.m.toFixed(0)} \\\\over ${calcs.p.toFixed(2)}} \\\\\\\\ &=${calcs.x.toFixed(2)}\\\\end{aligned}$$`"

    rightGraph:
      xAxis:
        max: 200
        ticks: 0
      yAxis:
        max: 40
        ticks: 0
      objects:

      - Label:
          coordinates: [AXIS, 40]
          text: p

      - Label:
          coordinates: [200, AXIS]
          text: Q

      - Curve:
          fn: (params.NC*params.a*params.m/(x))
          color: demand
          label:
            x: 190
            text: D(p)
            position: bl
            bgcolor: none

      - Curve:
          fn: (1.5*params.w)*sqrt((x)/(params.NF*params.K))
          color: supply
          label:
            x: 190
            text: S(p)
            position: tl
            bgcolor: none

      - Point:
          coordinates: [calcs.Q, calcs.p]
          color: budget
          droplines:
            vertical: calcs.Q.toFixed(2)
            horizontal:

    rightControls:
      title: Market Supply and Demand
      sliders:
        - param: NC
          label: N_C
        - param: NF
          label: N_F

      divs:
        - html: "`$$\\\\begin{aligned}S(p^*) &= N_F \\\\times s(p^*) = ${params.NF} \\\\times ${calcs.q.toFixed(2)} = ${calcs.Q.toFixed(2)}\\\\\\\\\\\\\\\\D(p^*) &= N_C \\\\times d(p^*)= ${params.NC} \\\\times ${calcs.x.toFixed(2)} = ${calcs.Q.toFixed(2)}\\\\end{aligned}$$`"


    middleGraph:
      xAxis:
        ticks: 0
        max: 15
      yAxis:
        max: 40
        ticks: 0
      objects:

      - Label:
          coordinates: [AXIS, 40]
          text: p

      - Label:
          coordinates: [15, AXIS]
          text: q^j

      - Curve:
          fn: (1.5*params.w/sqrt(params.K))*sqrt(x)
          color: supply
          label:
            y: 36
            text: s(p)
            position: tl
            bgcolor: none

      - Line:
          yIntercept: calcs.p
          color: budget
          lineStyle: dotted

      - Point:
          coordinates: [calcs.q, calcs.p]
          color: supply
          droplines:
            vertical: calcs.q.toFixed(2)

    middleControls:
      title: Individual Firm Supply
      sliders:
        - param: w
          label: w
        - param: K
          label: \overline K
      divs:
      - html: "`From $f(L,K) = L^{2/3}K^{1/3}$:`"
      - html: "`$$\\\\begin{aligned}s(p^*) &= {4\\\\overline{K} \\\\over 9w^2} (p^*)^2\\\\\\\\ &= {4 \\\\times ${params.K.toFixed(0)} \\\\over 9 \\\\times ${params.w.toFixed(0)}^2} \\\\times ${calcs.p.toFixed(2)}^2 \\\\\\\\ &=${calcs.q.toFixed(2)}\\\\end{aligned}$$`"
